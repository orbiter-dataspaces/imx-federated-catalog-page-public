name: Sync Release Commits

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write

jobs:
  merge-release-into-develop:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main branch
        run: git fetch origin main

      - name: Determine if merge is required
        id: needs-merge
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "needs_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_merge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge main into develop
        if: steps.needs-merge.outputs.needs_merge == 'true'
        run: git merge origin/main

      - name: Push develop branch
        if: steps.needs-merge.outputs.needs_merge == 'true'
        run: git push origin HEAD:develop
